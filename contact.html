<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>infigrit - Contact Us</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .contact-container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 3rem;
            border-radius: 16px;
            box-shadow: var(--shadow-soft);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-primary);
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-family: inherit;
        }

        .submit-btn {
            background: var(--accent-red);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }

        .submit-btn:hover {
            background: #b91c1c;
        }
    </style>
</head>

<body>
    <header class="site-header">
        <div class="logo-container">
            <img src="logo.png" alt="Infigrit Logo" style="height: 40px; width: auto; max-width: 150px; object-fit: contain;">
            <span class="site-title">infigrit</span>
        </div>
        <nav class="main-nav">
            <a href="index.html">Home</a>
            <a href="tutors.html">Tutors</a>
            <a href="e-class.html">E-Class</a>
            <a href="contact.html" class="active">Contact Us</a>
        </nav>
    </header>
    <main class="main-content">
        <div class="contact-container" style="max-width: 800px;">
            <h2 style="text-align: center; margin-bottom: 1rem;">Get In Touch</h2>
            <p style="text-align: center; color: var(--text-secondary); margin-bottom: 2rem;">We'd love to hear from
                you. Here's how you can reach us:</p>

            <div
                style="background: #f8fafc; padding: 2rem; border-radius: 12px; border: 1px solid #e2e8f0; margin-bottom: 2rem; display: flex; flex-direction: column; gap: 1rem;">
                <div style="display: flex; gap: 1rem; align-items: center;">
                    <span style="font-size: 1.5rem;">📧</span>
                    <a href="mailto:rama.neogy@gmail.com"
                        style="color: var(--accent-red); font-weight: 500; text-decoration: none; font-size: 1.1rem;">rama.neogy@gmail.com</a>
                </div>
                <div style="display: flex; gap: 1rem; align-items: center;">
                    <span style="font-size: 1.5rem;">📱</span>
                    <a href="https://api.whatsapp.com/send/?phone=917508033435&text&type=phone_number&app_absent=0"
                        target="_blank"
                        style="color: #10b981; font-weight: 600; font-size: 1.1rem; text-decoration: none;">+91
                        7508033435 (WhatsApp)</a>
                </div>
                <div style="display: flex; gap: 1rem; align-items: center;">
                    <span style="font-size: 1.5rem;">▶️</span>
                    <a href="https://www.youtube.com/@AncientWisdom_2.0" target="_blank"
                        style="color: var(--text-primary); text-decoration: none; font-weight: 500;">YouTube:
                        @AncientWisdom_2.0</a>
                </div>
                <div style="display: flex; gap: 1rem; align-items: center;">
                    <span style="font-size: 1.5rem;">💼</span>
                    <a href="https://www.linkedin.com/in/rama-neogy-2b106323/" target="_blank"
                        style="color: var(--text-primary); text-decoration: none; font-weight: 500;">LinkedIn: Rama
                        Neogy</a>
                </div>
            </div>

            <form>
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" placeholder="Your Name">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label>Message</label>
                    <textarea rows="5" placeholder="How can we help?"></textarea>
                </div>
                <button type="submit" class="submit-btn" onclick="event.preventDefault(); alert('Message sent!');">Send
                    Message</button>
            </form>
        </div>
    </main>
    <footer class="site-footer">
        <p>&copy; 2026 infigrit. All rights reserved.</p>
    </footer>
</body>

</html>
